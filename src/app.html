<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover" />
		<meta name="description" content="AI-powered card scanner for BoBA and Wonders of The First trading cards" />
		<meta name="theme-color" content="#070b14" />
		<meta property="og:title" content="Card Scanner" />
		<meta property="og:description" content="AI-powered card scanner for BoBA and Wonders of The First trading cards" />
		<meta property="og:type" content="website" />
		<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎴</text></svg>" />

		<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
		<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet" />

		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="Card Scanner" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="apple-touch-icon" href="/icon-192.png" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<title>Card Scanner | AI-Powered Card Recognition</title>
		<script nonce="%sveltekit.nonce%">
			try {
				var t = JSON.parse(localStorage.getItem('appTheme') || '{}');
				var m = t.mode === 'system'
					? (matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark')
					: (t.mode || 'dark');
				document.documentElement.dataset.theme = m;
				if (t.accentColor) document.documentElement.style.setProperty('--accent-primary', t.accentColor);
			} catch(e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
