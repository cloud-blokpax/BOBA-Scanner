name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Run tests
        run: npm test -- --reporter=verbose

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          # Post card-database unbundling: total JS should be under 500KB
          TOTAL=$(du -sb .svelte-kit/output/client/_app/ 2>/dev/null | awk '{print $1}')
          MAX=512000  # 500KB limit
          echo "Bundle size: ${TOTAL:-0} bytes (limit: $MAX)"
          if [ "${TOTAL:-0}" -gt "$MAX" ]; then
            echo "::error::Bundle size ${TOTAL} exceeds limit of $MAX bytes"
            exit 1
          fi
