name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          # Card database JSON is ~2.7MB compiled — exclude it from the app code budget
          APP_MAX=614400  # 600KB for application JS (excludes card data)
          TOTAL_MAX=4194304  # 4MB total including card database

          TOTAL_SIZE=$(find .svelte-kit/output/client -name '*.js' -exec wc -c {} + 2>/dev/null | tail -1 | awk '{print $1}')
          # Largest chunk is the card database; measure app code without it
          LARGEST=$(find .svelte-kit/output/client -name '*.js' -exec wc -c {} \; 2>/dev/null | sort -rn | head -1 | awk '{print $1}')
          APP_SIZE=$((${TOTAL_SIZE:-0} - ${LARGEST:-0}))

          echo "Total client JS: ${TOTAL_SIZE:-0} bytes (limit: ${TOTAL_MAX})"
          echo "App JS (excl. card data): ${APP_SIZE:-0} bytes (limit: ${APP_MAX})"

          if [ "${TOTAL_SIZE:-0}" -gt "$TOTAL_MAX" ]; then
            echo "::error::Total bundle ${TOTAL_SIZE} bytes exceeds ${TOTAL_MAX} bytes"
            exit 1
          fi
          if [ "${APP_SIZE:-0}" -gt "$APP_MAX" ]; then
            echo "::error::App bundle ${APP_SIZE} bytes exceeds ${APP_MAX} bytes"
            exit 1
          fi
