name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Run tests
        run: npm test -- --reporter=verbose

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          # Client JS bundle size check (excludes CSS, sourcemaps, server code)
          JS_TOTAL=$(find .svelte-kit/output/client/_app/ -name '*.js' -exec du -cb {} + 2>/dev/null | tail -1 | awk '{print $1}')
          JS_MAX=1400000  # 1.4MB limit for client JS
          echo "Client JS bundle: ${JS_TOTAL:-0} bytes (limit: $JS_MAX)"
          if [ "${JS_TOTAL:-0}" -gt "$JS_MAX" ]; then
            echo "::error::Client JS bundle ${JS_TOTAL} exceeds limit of $JS_MAX bytes"
            exit 1
          fi
