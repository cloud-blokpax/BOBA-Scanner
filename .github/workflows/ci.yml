name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Run tests
        run: npm test -- --reporter=verbose

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          # ── Entry chunk budget (first-paint metric) ──────────────
          # This is the load-bearing check. Entry = bootstrap JS that
          # loads on every page visit. Growth here directly hits TTI on
          # mobile. Tight by design.
          ENTRY_JS=$(find .svelte-kit/output/client/_app/immutable/entry -name '*.js' -exec du -cb {} + 2>/dev/null | tail -1 | awk '{print $1}')
          ENTRY_MAX=200000  # baseline ~17KB post-prompt-leak fix; 200KB gives headroom for the remaining launch features
          echo "Client entry JS: ${ENTRY_JS:-0} bytes (limit: $ENTRY_MAX)"
          if [ "${ENTRY_JS:-0}" -gt "$ENTRY_MAX" ]; then
            echo "::error::Client entry JS ${ENTRY_JS} exceeds limit of $ENTRY_MAX bytes. This is the first-paint budget — if this grew, check vite.config.ts and stats.html (CI artifact) to find what got eagerly imported."
            exit 1
          fi

          # ── Cumulative client JS (catastrophic-growth tripwire) ──
          # Secondary check. Lazy chunks count here but not in entry.
          # Tripping this means someone added a heavy dep or shipped a
          # large blob into client code. Raised from 1.7MB to 2MB to
          # accommodate Phase 2 diagnostic system (~14KB of error
          # capture, normalization, and triage instrumentation) and
          # give headroom for the remaining launch features.
          JS_TOTAL=$(find .svelte-kit/output/client/_app -name '*.js' -exec du -cb {} + 2>/dev/null | tail -1 | awk '{print $1}')
          JS_MAX=2000000
          echo "Client total JS: ${JS_TOTAL:-0} bytes (limit: $JS_MAX)"
          if [ "${JS_TOTAL:-0}" -gt "$JS_MAX" ]; then
            echo "::error::Client total JS ${JS_TOTAL} exceeds limit of $JS_MAX bytes. Download the 'bundle-stats' CI artifact and open stats.html to see what grew."
            exit 1
          fi

      - name: Upload bundle stats artifact
        if: always()  # upload even on failure — most useful when the check fails
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: .svelte-kit/stats.html
          retention-days: 14
          if-no-files-found: warn
