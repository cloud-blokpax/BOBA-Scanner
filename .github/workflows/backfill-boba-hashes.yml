name: Backfill BoBA hashes

# One-shot, manually-triggered. Runs scripts/backfill-boba-hashes.ts against
# production Supabase to seed hash_cache for any BoBA card that has an
# image_url but no hash row. Idempotent — safe to re-run.
#
# Requires repo secrets:
#   PUBLIC_SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: backfill-boba-hashes
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run backfill
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run backfill:boba-hashes
